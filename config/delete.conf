server {
    listen 8080;
    server_name localhost;
    
    root www;
    client_max_body_size 10000000;
    
    error_page 404 errors/404.html;
    error_page 403 errors/403.html;
    error_page 405 errors/405.html;
    
    location / {
        methods GET;
        autoindex off;
        index index.html;
    }
    
    location /uploads/ {
        methods GET POST DELETE;
        upload_path www/uploads;
    }
}