# note syl If the port is empty or not given, port 80 is assumed

server {
	listen 3333;
	server_name fury.com;
	error_page 404 error_page/404.html;
	error_page 403 error_page/403.html;
	error_page 400 error_page/400.html;
	error_page 405 error_page/405.html;
	error_page 500 502 error_page/50x.html;

	root /home/bastian/webserv/www;
	client_max_body_size 3000000;

	location / {
		method GET;
		autoindex off;
		index index.html;
	}
	location /upload {
		root /home/bastian/webserv;
		index index.html;
		method GET POST;
		upload_path /home/bastian/webserv/www/uploads;
	}
	location /cgi-bin {
		root /home/bastian/webserv;
		autoindex on;
		method GET POST;
		cgi_path /usr/bin/python;
		# cgi_path /usr/local/bin/node;
	}
}

