server {
	listen 2222;
	server_name 127.0.0.1;
	#error_page 404 errors/404.html;
	#error_page 400 errors/400.html;
	#error_page 405 errors/405.html;

	root www/beboccas
	client_max_body_size 1000000; 

	location / {
		method GET;
		autoindex off;
		index index.html;
	}

	location /test {
		root www/beboccas/uploads;
		method GET;
		autoindex on;
		index index.html;
	}

	location /test2 {
		root www/origameee;
		method GET;
		autoindex on;
		index index.html;
	}

	location /cgi-bin {
		root www/cgi-bin
		method GET POST;
		cgi_path /usr/bin/bash;
	}
}