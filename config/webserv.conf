server {
    listen 8080;
    server_name localhost;

    # Point to the runtime www directory (reset before tests)
    root tester_v2/www;
    client_max_body_size 10000000;

    # Error pages from www
    error_page 400 tester_v2/www/errors/400.html;
    error_page 403 tester_v2/www/errors/403.html;
    error_page 404 tester_v2/www/errors/404.html;
    error_page 405 tester_v2/www/errors/405.html;

    # Main location - only GET and HEAD
    location / {
        methods GET HEAD;
        autoindex off;
		index tiny.html;
    }

    # CGI location
    location /cgi-bin/ {
        methods GET POST;
        root tester_v2/www/cgi;
    }
}
