# Test: Port hors limites (devrait échouer)
server {
	listen 70000;
	server_name test1;
	root www;
	client_max_body_size 1000;
}

# Test 2: Port négatif (devrait échouer)
server {
	listen -1;
	server_name test2;
	root www;
}

# Test 3: Port invalide (texte au lieu de nombre)
server {
	listen invalid_port;
	server_name test3;
	root www;
}

# Test 4: Bloc non fermé (manque } à la fin)
server {
	listen 8080;
	server_name test4;
	root www;
	location / {
		method GET;
		index index.html;
	}
# Le } du server manque

