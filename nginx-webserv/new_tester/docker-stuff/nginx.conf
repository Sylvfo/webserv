# nginx.conf
user  www-data;
worker_processes  auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Force HTTP/1.0
    # For upstream connections:
    proxy_http_version 1.0;

    # Logging
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log warn;

    # Timeouts similar to typical webserv expectations
    client_header_timeout 10s;
    client_body_timeout   10s;
    send_timeout          10s;

    # Body size limit (tweak to test 413 behavior)
    client_max_body_size 1m;

    server {
        listen 80;
        server_name _;

        root /var/www/html;
        index index.html;

        # Error pages
        error_page 404 /errors/404.html;
        error_page 405 /errors/405.html;

        # Serve error templates internally
        location = /errors/404.html { internal; root /var/www; }
        location = /errors/405.html { internal; root /var/www; }

        # Static root, allow GET and HEAD only
        location / {
            if ($request_method !~ ^(GET|HEAD)$) {
                return 405;
            }
            try_files $uri $uri/ =404;
        }

        # Directory listing ON under /docs
        location /docs/ {
            autoindex on;
            if ($request_method !~ ^(GET|HEAD)$) {
                return 405;
            }
        }

        # Plain files under /docs path (no FastCGI in if)
        location ~ ^/docs/.+ {
            if ($request_method !~ ^(GET|HEAD)$) {
                return 405;
            }
            try_files $uri =404;
        }

        # CGI endpoint: echo request info (GET/POST)
        location /cgi-bin/echo {
            if ($request_method !~ ^(GET|POST)$) {
                return 405;
            }
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/cgi-bin/echo.sh;
            fastcgi_pass unix:/var/run/fcgiwrap.socket;
        }

        # CGI endpoint: upload (POST only)
        location /cgi-bin/upload {
            if ($request_method != POST) {
                return 405;
            }
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/cgi-bin/upload.sh;
            fastcgi_pass unix:/var/run/fcgiwrap.socket;
        }

        # Dedicated CGI endpoint to emulate DELETE (avoid FastCGI inside if)
        # Call with: curl -X DELETE http://localhost:8080/cgi-bin/delete
        location /cgi-bin/delete {
            if ($request_method != DELETE) {
                return 405;
            }
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/cgi-bin/echo.sh;
            fastcgi_pass unix:/var/run/fcgiwrap.socket;
        }

        # CGI wildcard: /cgi-bin/<script> (GET/POST)
        location ~ ^/cgi-bin/(?<script>.+)$ {
            if ($request_method !~ ^(GET|POST)$) {
                return 405;
            }
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/cgi-bin/$script;
            fastcgi_pass unix:/var/run/fcgiwrap.socket;
        }
    }
}
