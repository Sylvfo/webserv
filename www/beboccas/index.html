<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Simple API tester - GET POST DELETE + Upload</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>Tester une API simple — GET / POST / DELETE + Upload</h1>
    
    <!-- File Upload Section -->
    <div class="section">
      <h2>Upload de fichier</h2>
      <div class="row">
        <div style="flex:1">
          <label for="fileInput">Choisir un fichier</label>
          <input type="file" id="fileInput" multiple />
        </div>
        <div class="flex">
          <button class="btn-post" id="btnUpload">Upload</button>
        </div>
      </div>
    </div>

    <!-- File Management Section -->
    <div class="section">
      <h2>Gestion des fichiers</h2>
      <div class="row">
        <button class="btn-get" id="btnListFiles">Lister les fichiers</button>
      </div>
      <div id="filesList" class="files-list"></div>
    </div>

    <!-- API Testing Section -->
    <div class="section">
      <h2>Test d'API</h2>
      <div class="row">
        <div style="flex:1">
          <label for="endpoint">Endpoint</label>
          <input id="endpoint" value="/cgi-bin/api.cgi" placeholder="/cgi-bin/api.cgi" />
        </div>
        <div style="width:120px">
          <label for="id">ID (pour DELETE)</label>
          <input id="id" placeholder="123" />
        </div>
      </div>
      <div class="row">
        <div style="flex:1">
          <label for="payload">Payload JSON (pour POST)</label>
          <textarea id="payload">{"title":"Bonjour","body":"Contenu"}</textarea>
        </div>
      </div>
      <div class="row">
        <div class="flex">
          <button class="btn-get" id="btnGet">GET</button>
          <button class="btn-post" id="btnPost">POST</button>
          <button class="btn-delete" id="btnDelete">DELETE</button>
        </div>
      </div>
    </div>

    <!-- Response Section -->
    <div class="section">
      <label>Réponse</label>
      <div class="output" id="output">Prêt.</div>
    </div>
    
    <div class="footer">
      <div>Méthodes: GET · POST · DELETE · Upload</div>
      <div id="status">statut: inactif</div>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
