user www-data;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Force HTTP/1.0
    proxy_http_version 1.0;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Timeouts
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;

    server {
        listen 80;
        server_name test.webserv.local localhost;

        root /var/www/html;
        index index.html index.htm;

        # Client body size limit (10MB) - matches tester.conf
        client_max_body_size 10M;

        # Custom error pages - matches tester.conf
        error_page 400 /errors/400.html;
        error_page 403 /errors/403.html;
        error_page 404 /errors/404.html;
        error_page 405 /errors/405.html;
        error_page 500 502 503 504 /errors/50x.html;

        # Root location - GET and HEAD only (matches tester.conf)
        location / {
            limit_except GET HEAD {
                deny all;
            }
            autoindex off;
        }

        # Directory listing test (matches tester.conf)
        location /docs/ {
            limit_except GET HEAD {
                deny all;
            }
            autoindex on;
        }

        # CGI execution test (matches tester.conf)
        location /cgi-bin/ {
            limit_except GET POST DELETE {
                deny all;
            }

            # FastCGI for .sh scripts
            location ~ \.sh$ {
                gzip off;
                fastcgi_pass unix:/var/run/fcgiwrap.socket;
                include fastcgi_params;
                fastcgi_param SCRIPT_FILENAME /var/www$fastcgi_script_name;
            }
        }

        # Upload test (matches tester.conf)
        location /upload/ {
            limit_except POST DELETE {
                deny all;
            }
            client_max_body_size 5M;
        }

        # Redirect test 301 (matches tester.conf)
        location = /redirect {
            return 301 /;
        }

        # Redirect test 302 (matches tester.conf)
        location = /temp-redirect {
            return 302 /index.html;
        }

        # Static files with specific extensions (matches tester.conf)
        location ~ \.(jpg|jpeg|png|gif|ico|css|js)$ {
            limit_except GET HEAD {
                deny all;
            }
            autoindex off;
        }
    }
}
