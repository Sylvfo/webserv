services:
  nginx:
    build: .
    container_name: webserv_nginx_test
    ports:
      - "8080:80"
    volumes:
      # Dynamic paths from environment variables
      - ${WEBSERV_HTML_DIR:-../../www/origameee}:/var/www/html
      - ${WEBSERV_CGI_DIR:-../../www/cgi-bin}:/var/www/cgi-bin
      - ${WEBSERV_ERRORS_DIR:-../../www/errors}:/var/www/errors
      - ${NGINX_CONFIG:-./nginx.conf}:/etc/nginx/nginx.conf
    restart: unless-stopped
